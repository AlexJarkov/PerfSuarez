<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
        <title>Perfumes</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" sizes="16x16 32x32 48x48" href="imagenes/Cowboy.ico" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="imagenes/applogo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <meta name="apple-mobile-web-app-title" content="Perfumería Suárez">
    <meta property="og:title" content="Perfumes">
    <meta property="og:description" content="Descubre nuestro catálogo de perfumes completos.">
    <meta property="og:image" content="https://alexjarkov.github.io/PerfSuarez/imagenes/miniatura.JPEG">
    <meta property="og:url" content="http://alexjarkov.github.io/PerfSuarez/perfumes.html">
    <meta property="og:type" content="website">
    <style>
        body.perfumes-page {
            background: var(--surface);
            color: var(--ink);
        }

        body.perfumes-page main.page-shell {
            display: flex;
            flex-direction: column;
            gap: clamp(56px, 8vw, 96px);
            padding-block: clamp(48px, 8vw, 104px) 140px;
        }

        .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.78rem;
            color: var(--accent);
        }

        .catalog-section {
            background: var(--surface-strong);
            border-radius: 28px;
            border: 1px solid var(--divider);
            padding: clamp(28px, 6vw, 52px);
            display: flex;
            flex-direction: column;
            gap: clamp(28px, 5vw, 52px);
        }

        .section-heading {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 680px;
        }

        .section-heading h2 {
            margin: 0;
            font-size: clamp(1.9rem, 3vw, 2.5rem);
        }

        .section-heading p {
            margin: 0;
            color: var(--muted-ink);
            line-height: 1.6;
        }

        .catalog-intro {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            gap: 28px;
        }

        .catalog-controls {
            display: grid;
            gap: 20px;
        }

        .search-field,
        .select-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-field label,
        .select-field label {
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-dark);
        }

        .search-field input,
        .select-field select {
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(17, 17, 17, 0.16);
            background: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .search-field input:focus,
        .select-field select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(26, 112, 64, 0.12);
        }

        .select-row {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .toggle-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--divider);
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 0.9rem;
            color: var(--muted-ink);
        }

        .toggle input {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
        }

        .pagination-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 20px;
            border-radius: 18px;
            border: 1px solid var(--divider);
            background: var(--surface);
        }

        .pagination-controls .page-size {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pagination-controls label {
            font-size: 0.85rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted-ink);
        }

        .pagination-controls input[type="number"] {
            width: 88px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid rgba(17, 17, 17, 0.2);
            font-size: 0.95rem;
        }

        .pagination-controls .pager {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pagination-controls .pager button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(17, 17, 17, 0.16);
            background: #fff;
            cursor: pointer;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .pagination-controls .pager button:hover {
            border-color: rgba(17, 17, 17, 0.4);
            background: rgba(17, 17, 17, 0.05);
        }

        .pagination-controls .pager span {
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .empty-state {
            display: none;
            padding: 20px 24px;
            border-radius: 18px;
            background: rgba(26, 112, 64, 0.08);
            border: 1px solid rgba(26, 112, 64, 0.18);
            color: var(--accent-dark);
            font-weight: 500;
        }

        .empty-state p {
            margin: 0;
        }

        .empty-state.show {
            display: block;
        }

        .fragrance-grid {
            display: grid;
            gap: 24px;
            grid-template-columns: repeat(3, 1fr);
        }

        .decant {
            background: var(--surface);
            border-radius: 24px;
            border: 1px solid var(--divider);
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .decant:hover,
        .decant:focus-visible {
            transform: translateY(-4px);
            box-shadow: 0 24px 52px rgba(17, 17, 17, 0.12);
        }

        .decant img {
            width: 100%;
            border-radius: 18px;
            object-fit: cover;
            aspect-ratio: 4 / 5;
            background: #f4f4f4;
        }

        .decant h3 {
            margin: 0;
            font-size: 1.05rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            overflow-wrap: anywhere;
            hyphens: auto;
        }

        .decant p {
            margin: 0;
            color: var(--muted-ink);
            line-height: 1.5;
            overflow-wrap: anywhere;
            hyphens: auto;
        }

        .decant .price-label {
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent-dark);
        }

        .etiquetas {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .etiqueta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.72rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            overflow-wrap: anywhere;
            hyphens: auto;
        }

        .etiqueta.novedad {
            background: rgba(26, 112, 64, 0.14);
            color: var(--accent-dark);
        }

        .etiqueta.fuera-de-stock {
            background: rgba(17, 17, 17, 0.08);
            color: var(--muted-ink);
        }

        .etiqueta.a-pedido {
            background: rgba(17, 17, 17, 0.16);
            color: var(--ink);
        }

        .perfume-grid.is-paging {
            opacity: 0.6;
            transition: opacity 0.25s ease;
        }

        .pag-hidden {
            display: none !important;
        }

        @media (min-width: 900px) {
            .catalog-controls {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 12px;
                align-items: flex-end;
            }

            .search-field {
                flex: 2;
                min-width: 200px;
            }

            .select-row {
                display: flex;
                flex-direction: row;
                gap: 12px;
                flex: 3;
                min-width: 280px;
            }

            .select-field {
                flex: 1;
            }

            .toggle-group {
                flex: 0 0 auto;
                flex-wrap: wrap;
                gap: 8px;
            }
        }

        @media (max-width: 900px) {
            .fragrance-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .fragrance-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        @media (max-width: 700px) {
            .pagination-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .pagination-controls .page-size {
                width: 100%;
                justify-content: space-between;
            }

            .pagination-controls .pager {
                justify-content: space-between;
            }
        }
    </style>
</head>

<body class="perfumes-page">
    <main class="page-shell">
        <section id="catalogo" class="catalog-section">
            <div class="catalog-intro">
                <div class="section-heading">
                    <span class="eyebrow">Selección curada</span>
                    <h1>Perfumes completos y exclusividades</h1>
                    <p>Desde best sellers urbanos hasta composiciones nicho difíciles de conseguir, cada pieza se prueba y valida antes de llegar a tus manos.</p>
                </div>
            </div>
            <div class="catalog-controls">
                <div class="search-field">
                    <label for="perfume-search">Buscar perfumes</label>
                    <input type="text" id="perfume-search" placeholder="Introduce nombre, nota o marca">
                </div>
                <div class="select-row">
                    <div class="select-field">
                        <label for="perfume-category">Categoría</label>
                        <select id="perfume-category">
                            <option value="all">Todas las categorías</option>
                            <option value="hombre">Hombre</option>
                            <option value="mujer">Mujer</option>
                            <option value="unisex">Unisex</option>
                            <option value="nicho">Nicho</option>
                            <option value="arabes">Árabes</option>
                        </select>
                    </div>
                    <div class="select-field">
                        <label for="perfume-brand">Marca</label>
                        <select id="perfume-brand">
                            <option value="all">Todas las marcas</option>
                        </select>
                    </div>
                </div>
                <div class="toggle-group">
                    <label class="toggle">
                        <input type="checkbox" id="stock-filter" checked>
                        <span>Solo perfumes en stock</span>
                    </label>
                    <label class="toggle">
                        <input type="checkbox" id="new-filter">
                        <span>Mostrar solo perfumes nuevos</span>
                    </label>
                </div>
            </div>
            <div class="pagination-controls" id="pagination-top">
                <div class="page-size">
                    <label for="page-size-input">Tarjetas por página</label>
                    <input id="page-size-input" type="number" min="1" step="1" value="20">
                </div>
                <div class="pager">
                    <button id="page-prev" type="button" aria-label="Página anterior">&laquo;</button>
                    <span id="page-status" aria-live="polite">Página 1 de 1</span>
                    <button id="page-next" type="button" aria-label="Página siguiente">&raquo;</button>
                </div>
            </div>
            <div id="no-results-message" class="empty-state" aria-live="polite">
                <p>Perdón pariente... No tenemos perfumes que coincidan con tu búsqueda :(</p>
            </div>
            <div class="fragrance-grid perfume-grid" id="perfume-grid"></div>
            <div class="pagination-controls pagination-bottom" id="pagination-bottom">
                <div class="page-size">
                    <label for="page-size-input-bottom">Tarjetas por página</label>
                    <input id="page-size-input-bottom" type="number" min="1" step="1" value="20">
                </div>
                <div class="pager">
                    <button id="page-prev-bottom" type="button" aria-label="Página anterior">&laquo;</button>
                    <span id="page-status-bottom" aria-live="polite">Página 1 de 1</span>
                    <button id="page-next-bottom" type="button" aria-label="Página siguiente">&raquo;</button>
                </div>
            </div>
        </section>
    </main>

    <script src="js/core/app.js"></script>
    <script src="js/data/perfumes-data.js"></script>
    <script src="js/viewmodels/catalog-renderer.js"></script>
    <script src="js/scripts.js"></script>
    <script src="js/include.js"></script>
    <script>
(function () {
    'use strict';

    var App = window.PerfSuarez;

    class LazyImages {
        constructor(selector) { this.selector = selector || '.perfume-grid img'; }
        init() {
            var imgs = document.querySelectorAll(this.selector);
            imgs.forEach(function (img, i) {
                if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
                if (!img.hasAttribute('decoding')) img.setAttribute('decoding', 'async');
                if (i < 4 && !img.hasAttribute('fetchpriority')) img.setAttribute('fetchpriority', 'high');
            });
            if ('IntersectionObserver' in window) {
                var io = new IntersectionObserver(function (entries, obs) {
                    entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in-view'); obs.unobserve(e.target); } });
                }, { rootMargin: '200px 0px' });
                imgs.forEach(function (img) { io.observe(img); });
            }
        }
    }

    class Paginator {
        constructor(opts) {
            this.grid = typeof opts.gridEl === 'string' ? document.querySelector(opts.gridEl) : opts.gridEl;
            this.selector = opts.itemSelector || '.decant';
            this.items = [];
            this.controls = [];
            if (Array.isArray(opts.controls)) {
                opts.controls.forEach(c => this._attachControls(c));
            } else {
                this._attachControls(opts);
            }
            this.pageSize = this._initialPageSize();
            this.page = 1;
            this._bind();
        }
        _qs(s) { return typeof s === 'string' ? document.querySelector(s) : s; }
        _attachControls(c) {
            var input = this._qs(c.inputEl), prev = this._qs(c.prevEl), next = this._qs(c.nextEl), status = this._qs(c.statusEl);
            var wrapper = (input || prev || next || status) ? (input || prev || next || status).closest('.pagination-controls') : null;
            this.controls.push({ input: input, prev: prev, next: next, status: status, wrapper: wrapper });
        }
        _initialPageSize() {
            for (var i = 0; i < this.controls.length; i++) {
                var c = this.controls[i];
                if (c.input && c.input.value) { var v = parseInt(c.input.value, 10); if (Number.isFinite(v) && v > 0) return v; }
            }
            return 20;
        }
        _universe() { return this.items.filter(function (el) { return el.style.display !== 'none'; }); }
        _totalPages() { return Math.max(1, Math.ceil(this._universe().length / this.pageSize)); }
        _syncInputs() {
            var ps = String(this.pageSize);
            this.controls.forEach(function (c) { if (c.input && c.input.value !== ps) c.input.value = ps; });
        }
        _updateUI(total) {
            var self = this;
            this.controls.forEach(function (c) {
                if (c.status) c.status.textContent = 'Página ' + self.page + ' de ' + total;
                if (c.prev) c.prev.disabled = self.page <= 1;
                if (c.next) c.next.disabled = self.page >= total;
                if (c.wrapper) c.wrapper.style.display = total > 1 ? '' : 'none';
            });
            this._syncInputs();
        }
        render() {
            if (!this.grid) return;
            this.items = Array.from(this.grid.querySelectorAll(this.selector));
            var universe = this._universe();
            var total = Math.max(1, Math.ceil(universe.length / this.pageSize));
            if (this.page > total) this.page = total;
            var start = (this.page - 1) * this.pageSize, end = start + this.pageSize;
            this.grid.classList.add('is-paging');
            this.items.forEach(function (el) { el.classList.remove('pag-hidden'); });
            universe.forEach(function (el, idx) { el.classList.toggle('pag-hidden', !(idx >= start && idx < end)); });
            this._updateUI(total);
            var grid = this.grid;
            requestAnimationFrame(function () { setTimeout(function () { grid.classList.remove('is-paging'); }, 100); });
        }
        refresh() { this.items = Array.from(this.grid.querySelectorAll(this.selector)); var t = this._totalPages(); if (this.page > t) this.page = t; this.render(); }
        setPageSize(n) {
            var old = this.pageSize;
            this.pageSize = Math.max(1, parseInt(n, 10) || 1);
            var startIndex = (this.page - 1) * old;
            this.page = Math.floor(startIndex / this.pageSize) + 1;
            this._syncInputs();
            this.render();
        }
        _bind() {
            var self = this;
            this.controls.forEach(function (c) {
                if (c.prev) c.prev.addEventListener('click', function () { self.page = Math.max(1, self.page - 1); self.render(); });
                if (c.next) c.next.addEventListener('click', function () { self.page = Math.min(self._totalPages(), self.page + 1); self.render(); });
                if (c.input) c.input.addEventListener('change', function () { var v = parseInt(c.input.value, 10); if (!Number.isFinite(v) || v < 1) v = 1; self.setPageSize(v); });
            });
        }
    }

    function normalizeBrandValue(v) {
        if (!v) return '';
        v = v.toLowerCase();
        if (v === 'd&g') return 'dolce';
        if (v === 'mntblanc') return 'montblanc';
        return v;
    }

    document.addEventListener('DOMContentLoaded', function () {
        var grid = document.getElementById('perfume-grid');
        if (!grid) return;

        // Render cards from JSON
        var cards = App.viewmodels.catalogRenderer.renderCatalog(grid, 'perfumes');

        // Bind card click → navigate to detail page
        App.viewmodels.catalogRenderer.bindCardNavigation(grid);

        // Lazy images
        try { new LazyImages('.perfume-grid img').init(); } catch (_) {}

        // Populate brand dropdown dynamically
        var brandSelect = document.getElementById('perfume-brand');
        if (brandSelect && cards.length) {
            var brandMap = new Map();
            cards.forEach(function (card) {
                var strong = card.querySelector('h3 strong');
                var display = strong ? strong.textContent.trim() : '';
                if (!display) return;
                var slug = display.toLowerCase();
                card.dataset.brand = slug;
                if (!brandMap.has(slug)) brandMap.set(slug, display);
            });
            Array.from(brandMap.entries())
                .sort(function (a, b) { return a[1].localeCompare(b[1], 'es', { sensitivity: 'base' }); })
                .forEach(function (entry) {
                    var opt = document.createElement('option');
                    opt.value = entry[0];
                    opt.textContent = entry[1];
                    brandSelect.appendChild(opt);
                });
        }

        // Pagination
        var controls = [];
        if (document.querySelector('#page-size-input') && document.querySelector('#page-prev') && document.querySelector('#page-next') && document.querySelector('#page-status')) {
            controls.push({ inputEl: '#page-size-input', prevEl: '#page-prev', nextEl: '#page-next', statusEl: '#page-status' });
        }
        if (document.querySelector('#page-size-input-bottom') && document.querySelector('#page-prev-bottom') && document.querySelector('#page-next-bottom') && document.querySelector('#page-status-bottom')) {
            controls.push({ inputEl: '#page-size-input-bottom', prevEl: '#page-prev-bottom', nextEl: '#page-next-bottom', statusEl: '#page-status-bottom' });
        }
        var pager = (grid && controls.length) ? new Paginator({ gridEl: grid, itemSelector: '.decant', controls: controls }) : null;
        if (pager) window.perfumesPager = pager;

        // Filters
        var searchInput = document.getElementById('perfume-search');
        var categorySelect = document.getElementById('perfume-category');
        var stockToggle = document.getElementById('stock-filter');
        var newToggle = document.getElementById('new-filter');
        var emptyState = document.getElementById('no-results-message');

        function applyFilters() {
            var q = (searchInput ? searchInput.value : '').trim().toLowerCase();
            var cat = (categorySelect ? categorySelect.value : 'all').toLowerCase();
            var brand = normalizeBrandValue(brandSelect ? brandSelect.value : 'all');
            var hideOut = !!(stockToggle && stockToggle.checked);
            var onlyNew = !!(newToggle && newToggle.checked);

            var visible = 0;
            cards.forEach(function (card) {
                var name = (card.dataset.name || card.textContent || '').toLowerCase();
                var tags = (card.dataset.tags || '').toLowerCase();
                var brandText = (card.dataset.brand || (card.querySelector('h3') ? card.querySelector('h3').textContent : '') || '').toLowerCase();
                var hasOutBadge = !!card.querySelector('.etiqueta.fuera-de-stock');
                var hasNewBadge = !!card.querySelector('.etiqueta.novedad');

                var matchesSearch = !q || name.includes(q) || tags.includes(q) || card.textContent.toLowerCase().includes(q);
                var matchesCat = cat === 'all' || tags.includes(cat);
                var matchesBrand = brand === 'all' || tags.includes(brand) || brandText.includes(brand) || name.includes(brand);
                var matchesStock = !hideOut || !hasOutBadge;
                var matchesNew = !onlyNew || hasNewBadge;

                var show = matchesSearch && matchesCat && matchesBrand && matchesStock && matchesNew;
                card.style.display = show ? '' : 'none';
                if (show) visible++;
            });

            if (emptyState) emptyState.classList.toggle('show', visible === 0);
            if (pager) pager.refresh();
        }
        window.filterPerfumes = applyFilters;

        if (searchInput) searchInput.addEventListener('input', applyFilters);
        if (categorySelect) categorySelect.addEventListener('change', applyFilters);
        if (brandSelect) brandSelect.addEventListener('change', applyFilters);
        if (stockToggle) stockToggle.addEventListener('change', applyFilters);
        if (newToggle) newToggle.addEventListener('change', applyFilters);

        applyFilters();
    }, { once: true });
})();
</script>

</body>

</html>
