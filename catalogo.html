<body class="home-hub">
    <main class="home-launcher" aria-label="Accesos principales">
        <img src="imagenes/Suarez.png" alt="Perfumería Suárez" class="home-logo" width="742" height="320" fetchpriority="high">
        <section class="home-novedades" aria-label="Novedades">
            <span class="home-novedades__eyebrow">Novedades</span>
            <div class="home-novedades__viewport" data-shell-swipe-ignore>
                <div class="home-novedades__track" id="novedades-track">
                    <a class="home-novedades__slide" href="perfumes.html" data-shell-target="perfumes.html" aria-label="Novedad: Vulcan Feu, Afnan Turathi Electric y Haramain Amber Oud">
                        <img src="imagenes/novedades/novedad-1.jpg" alt="Novedad — Vulcan Feu, Afnan Turathi Electric y Haramain Amber Oud" width="1122" height="1402" loading="eager" decoding="async">
                    </a>
                    <a class="home-novedades__slide" href="perfumes.html" data-shell-target="perfumes.html" aria-label="Descuento del mes: Paco Rabanne Phantom">
                        <img src="imagenes/novedades/novedad-2.jpg" alt="Descuento del mes — Paco Rabanne Phantom" width="1122" height="1402" loading="lazy" decoding="async">
                    </a>
                    <a class="home-novedades__slide" href="perfumes.html" data-shell-target="perfumes.html" aria-label="De regreso: Louis Vuitton Imagination, Pacific Chill y Ombre Nomade">
                        <img src="imagenes/novedades/novedad-3.jpg" alt="De regreso — Louis Vuitton Imagination, Pacific Chill y Ombre Nomade" width="1122" height="1402" loading="lazy" decoding="async">
                    </a>
                </div>
            </div>
            <div class="home-novedades__dots" id="novedades-dots" role="tablist" aria-label="Seleccionar novedad"></div>
        </section>
        <div class="home-actions">
            <a class="home-action home-action--primary" href="https://wa.link/wfehwk" target="_blank" rel="noopener noreferrer">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 15a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4"></path>
                        <path d="M4 15v4a1 1 0 0 0 1 1h6"></path>
                        <path d="M10 19v-4"></path>
                        <path d="M14 11V7a4 4 0 1 1 8 0v8"></path>
                        <path d="M18 15v4"></path>
                    </svg>
                </span>
                <span>Asesoramiento guiado</span>
            </a>
            <a class="home-action" href="perfumes.html" data-shell-target="perfumes.html">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="10" y="2.6" width="4" height="2.8" rx="0.8"></rect>
                        <path d="M10.5 5.4V7M13.5 5.4V7"></path>
                        <rect x="7.5" y="7" width="9" height="14" rx="3"></rect>
                        <path d="M7.5 12h9"></path>
                    </svg>
                </span>
                <span>Perfumes</span>
            </a>
            <a class="home-action" href="decants.html" data-shell-target="decants.html">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M7 5v10.5a2 2 0 0 0 4 0V5"></path>
                        <path d="M6.4 5h5.2"></path>
                        <path d="M7 11h4"></path>
                        <path d="M13.6 8v7.6a1.9 1.9 0 0 0 3.8 0V8"></path>
                        <path d="M13 8h5"></path>
                        <path d="M13.6 12.6h3.8"></path>
                    </svg>
                </span>
                <span>Decants</span>
            </a>
            <a class="home-action" href="armarcombo.html" data-shell-target="armarcombo.html">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6.5 9h11l-.9 10.2a2 2 0 0 1-2 1.8H9.4a2 2 0 0 1-2-1.8z"></path>
                        <path d="M9 9V7.2a3 3 0 0 1 6 0V9"></path>
                        <path d="M12 12.5v4M10 14.5h4"></path>
                    </svg>
                </span>
                <span>Arma tu combo</span>
            </a>
            <a class="home-action" href="mysterybox.html" data-shell-target="mysterybox.html">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="4" y="6.5" width="16" height="13" rx="2.5"></rect>
                        <path d="M4 10.5h16"></path>
                        <path d="M10.3 14a1.7 1.7 0 1 1 2.6 1.5c-.6.4-.9.8-.9 1.5"></path>
                        <path d="M12 18.4h.01"></path>
                    </svg>
                </span>
                <span>Mystery Box</span>
            </a>
            <a class="home-action" href="cuadros.html" data-shell-target="cuadros.html">
                <span class="home-action__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3.5" y="4.5" width="17" height="15" rx="2"></rect>
                        <circle cx="8.5" cy="9.5" r="1.5"></circle>
                        <path d="M4 16.5 8.5 12l3 3 3.5-3.5 4.5 4.5"></path>
                    </svg>
                </span>
                <span>Cuadros</span>
            </a>
        </div>
